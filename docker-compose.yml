services:

  # Backend: Node.js/Express REST-API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beihilfe-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/beihilfe.db
    volumes:
      - db_data:/data
    ports:
      - "3000:3000"

  # Frontend: nginx mit statischen HTML/CSS/JS Dateien
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: beihilfe-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  # Persistentes Volume für SQLite-Datenbank
  # Datenbank überlebt Container-Neustarts und Updates
  db_data:
    driver: local
