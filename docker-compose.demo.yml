version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/beihilfe.db

  beihilfe-frontend-demo:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./app:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro


